<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Fundastock Team</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#f0f2f5;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* Login */
.login-screen{display:flex;align-items:center;justify-content:center;height:100vh;background:linear-gradient(135deg,#1a1a2e,#16213e)}
.login-box{background:#fff;border-radius:16px;padding:40px;width:320px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-box h1{font-size:22px;margin-bottom:8px}
.login-box p{font-size:13px;color:#888;margin-bottom:24px}
.login-box input{width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;font-size:14px;margin-bottom:12px;outline:none}
.login-box input:focus{border-color:#1565C0}
.login-box button{width:100%;padding:12px;background:#1565C0;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
.login-box button:hover{background:#0d47a1}
.login-error{color:#e53935;font-size:12px;margin-top:8px}

/* App Layout */
.app{display:none;height:100vh;flex-direction:column}
.app.active{display:flex}

/* Header */
.header{background:#1565C0;color:#fff;padding:12px 16px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.header .back{display:none;cursor:pointer;font-size:20px}
.header .title{font-size:16px;font-weight:600;flex:1}
.header .subtitle{font-size:11px;opacity:.7}
.header .menu-btn{cursor:pointer;font-size:20px}

/* Sidebar */
.sidebar{display:flex;flex-direction:column;background:#fff;border-right:1px solid #e0e0e0}
.channel-list{flex:1;overflow-y:auto;padding:8px}
.channel-item{display:flex;align-items:center;gap:10px;padding:12px;border-radius:8px;cursor:pointer;transition:.15s}
.channel-item:hover,.channel-item.active{background:#e3f2fd}
.channel-icon{font-size:20px}
.channel-name{font-size:14px;font-weight:500}
.channel-preview{font-size:11px;color:#888;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px}
.user-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer}
.user-item:hover{background:#f5f5f5}
.user-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:13px}
.user-name{font-size:13px;font-weight:500}
.section-title{font-size:11px;font-weight:600;color:#888;letter-spacing:1px;padding:16px 12px 6px;text-transform:uppercase}
.unread-badge{background:#e53935;color:#fff;border-radius:10px;padding:2px 7px;font-size:10px;font-weight:600}

/* Messages area */
.messages-container{flex:1;display:flex;flex-direction:column;min-width:0}
.messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:4px}
.msg{max-width:75%;padding:8px 12px;border-radius:12px;font-size:14px;line-height:1.4;position:relative;word-wrap:break-word}
.msg.sent{align-self:flex-end;background:#dcf8c6;border-bottom-right-radius:4px}
.msg.received{align-self:flex-start;background:#fff;border-bottom-left-radius:4px;box-shadow:0 1px 2px rgba(0,0,0,.08)}
.msg.ai{align-self:flex-start;background:#e8eaf6;border-left:3px solid #5c6bc0}
.msg-sender{font-size:11px;font-weight:600;margin-bottom:2px}
.msg-time{font-size:10px;color:#888;text-align:right;margin-top:2px}
.msg-file{margin:6px 0}
.msg-file img{max-width:200px;max-height:200px;border-radius:8px;cursor:pointer}
.msg-file a{color:#1565C0;font-size:12px;text-decoration:none}
.date-separator{text-align:center;margin:12px 0;font-size:11px;color:#888;font-weight:500}

/* Input area */
.input-area{display:flex;align-items:flex-end;gap:8px;padding:10px 16px;background:#fff;border-top:1px solid #e0e0e0}
.input-area textarea{flex:1;padding:10px 14px;border:1px solid #ddd;border-radius:20px;font-size:14px;font-family:inherit;resize:none;max-height:120px;outline:none;line-height:1.4}
.input-area textarea:focus{border-color:#1565C0}
.input-area .btn-attach{background:none;border:none;font-size:22px;cursor:pointer;padding:8px;color:#555}
.input-area .btn-send{background:#1565C0;border:none;border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;font-size:18px}
.input-area .btn-send:hover{background:#0d47a1}
input[type="file"]{display:none}

/* Desktop layout */
@media(min-width:768px){
  .app{flex-direction:row}
  .sidebar{width:300px;display:flex!important}
  .header .back{display:none!important}
  .messages-container{flex:1}
}
/* Mobile layout */
@media(max-width:767px){
  .sidebar{position:absolute;top:0;left:0;right:0;bottom:0;z-index:50;display:none}
  .sidebar.show{display:flex}
  .header .back{display:block}
  .header .menu-btn{display:block}
}
</style>
</head>
<body>

<!-- Login Screen -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h1>FUNDASTOCK</h1>
    <p>Chat del equipo</p>
    <input type="text" id="loginUser" placeholder="Usuario" autocomplete="off" autofocus>
    <input type="password" id="loginPass" placeholder="Contrasena">
    <button onclick="login()">Entrar</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- App -->
<div class="app" id="app">
  <div class="header">
    <div class="back" onclick="showSidebar()">←</div>
    <div>
      <div class="title" id="headerTitle">General</div>
      <div class="subtitle" id="headerSubtitle">Equipo Fundastock</div>
    </div>
    <div class="menu-btn" onclick="toggleSidebar()">☰</div>
  </div>

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="section-title">Canales</div>
    <div class="channel-list" id="channelList"></div>
    <div class="section-title">Mensajes Directos</div>
    <div id="userList"></div>
  </div>

  <!-- Messages -->
  <div class="messages-container">
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <button class="btn-attach" onclick="document.getElementById('fileInput').click()">📎</button>
      <input type="file" id="fileInput" accept="image/*,application/pdf,.doc,.docx" onchange="handleFile(event)">
      <textarea id="msgInput" rows="1" placeholder="Escribe un mensaje..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
      <button class="btn-send" onclick="sendMessage()">➤</button>
    </div>
  </div>
</div>

<script>
const API = '';
let currentUser = null;
let currentChannel = 'general';
let currentDM = null;  // user_id for private messages
let pollInterval = null;
let lastMsgId = 0;

// ── Login ──────────────────────────────────────────────────
async function login() {
  const user = document.getElementById('loginUser').value.trim().toLowerCase();
  const pass = document.getElementById('loginPass').value.trim();
  const errEl = document.getElementById('loginError');
  if (!user || !pass) { errEl.textContent = 'Ingresa usuario y contrasena'; return; }

  try {
    const resp = await fetch(`${API}/api/chat/login`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({username: user, password: pass}),
    });
    const data = await resp.json();
    if (!resp.ok || !data.ok) {
      errEl.textContent = data.error || 'Usuario o contrasena incorrectos';
      return;
    }
    currentUser = data.user;
    localStorage.setItem('chat_user', JSON.stringify(currentUser));
    showApp();
  } catch(e) {
    errEl.textContent = 'Error de conexion';
  }
}

function showApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').classList.add('active');
  loadChannels();
  loadUsers();
  switchChannel('general');
  // Poll every 3 seconds
  pollInterval = setInterval(loadMessages, 3000);
}

// ── Check saved login ──────────────────────────────────────
(function checkLogin() {
  const saved = localStorage.getItem('chat_user');
  if (saved) {
    currentUser = JSON.parse(saved);
    showApp();
  }
})();

// ── Channels ───────────────────────────────────────────────
async function loadChannels() {
  try {
    const resp = await fetch(`${API}/api/chat/channels`);
    const channels = await resp.json();
    const list = document.getElementById('channelList');
    list.innerHTML = '';
    channels.forEach(ch => {
      const div = document.createElement('div');
      div.className = 'channel-item' + (currentChannel === ch.name ? ' active' : '');
      div.innerHTML = `<span class="channel-icon">${ch.icon || '💬'}</span><div><div class="channel-name">${ch.name}</div><div class="channel-preview">${ch.description || ''}</div></div>`;
      div.onclick = () => switchChannel(ch.name);
      list.appendChild(div);
    });
  } catch(e) { console.error('Channels error:', e); }
}

async function loadUsers() {
  try {
    const resp = await fetch(`${API}/api/chat/users`);
    const users = await resp.json();
    const list = document.getElementById('userList');
    list.innerHTML = '';
    users.filter(u => u.id !== currentUser.id).forEach(u => {
      const div = document.createElement('div');
      div.className = 'user-item';
      div.innerHTML = `<div class="user-avatar" style="background:${u.avatar_color}">${u.display_name[0]}</div><div class="user-name">${u.display_name}</div>`;
      div.onclick = () => switchDM(u);
      list.appendChild(div);
    });
  } catch(e) {}
}

function switchChannel(name) {
  currentChannel = name;
  currentDM = null;
  lastMsgId = 0;
  document.getElementById('headerTitle').textContent = '#' + name;
  document.getElementById('headerSubtitle').textContent = 'Canal del equipo';
  document.getElementById('messages').innerHTML = '';
  loadChannels();
  loadMessages();
  hideSidebar();
}

function switchDM(user) {
  currentDM = user;
  currentChannel = null;
  lastMsgId = 0;
  document.getElementById('headerTitle').textContent = user.display_name;
  document.getElementById('headerSubtitle').textContent = 'Mensaje directo';
  document.getElementById('messages').innerHTML = '';
  loadMessages();
  hideSidebar();
}

// ── Messages ───────────────────────────────────────────────
async function loadMessages() {
  try {
    let url;
    if (currentDM) {
      url = `${API}/api/chat/messages?dm_user=${currentDM.id}&user_id=${currentUser.id}&after=${lastMsgId}`;
    } else {
      url = `${API}/api/chat/messages?channel=${currentChannel}&after=${lastMsgId}`;
    }
    const resp = await fetch(url);
    const msgs = await resp.json();
    if (!msgs.length) return;

    const container = document.getElementById('messages');
    msgs.forEach(m => {
      if (m.id <= lastMsgId) return;
      lastMsgId = m.id;

      const div = document.createElement('div');
      const isSent = m.sender_id === currentUser.id;
      const isAI = m.is_ai;
      div.className = 'msg ' + (isAI ? 'ai' : (isSent ? 'sent' : 'received'));

      let fileHtml = '';
      if (m.file_url) {
        if (m.file_type === 'image') {
          fileHtml = `<div class="msg-file"><img src="${m.file_url}" onclick="window.open('${m.file_url}')"></div>`;
        } else {
          fileHtml = `<div class="msg-file"><a href="${m.file_url}" target="_blank">📄 ${m.file_name || 'Archivo'}</a></div>`;
        }
      }

      const senderName = isAI ? '🧠 ARGOS' : (isSent ? '' : m.sender_name);
      const time = new Date(m.created_at).toLocaleTimeString('es-MX', {hour:'2-digit', minute:'2-digit', timeZone:'America/Mexico_City'});

      div.innerHTML = `${senderName ? `<div class="msg-sender" style="color:${m.sender_color || '#555'}">${senderName}</div>` : ''}${fileHtml}${m.content || ''}<div class="msg-time">${time}</div>`;
      container.appendChild(div);
    });

    container.scrollTop = container.scrollHeight;
  } catch(e) { console.error('Messages error:', e); }
}

async function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text) return;

  const body = {
    sender_id: currentUser.id,
    sender_name: currentUser.display_name,
    content: text,
  };
  if (currentDM) {
    body.recipient_id = currentDM.id;
    body.channel = 'private';
  } else {
    body.channel = currentChannel;
  }

  input.value = '';
  input.style.height = 'auto';

  try {
    await fetch(`${API}/api/chat/send`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body),
    });
    loadMessages();
  } catch(e) { console.error('Send error:', e); }
}

async function handleFile(event) {
  const file = event.target.files[0];
  if (!file) return;

  const formData = new FormData();
  formData.append('file', file);
  formData.append('sender_id', currentUser.id);
  formData.append('sender_name', currentUser.display_name);
  formData.append('channel', currentDM ? 'private' : currentChannel);
  if (currentDM) formData.append('recipient_id', currentDM.id);

  try {
    await fetch(`${API}/api/chat/upload`, {method: 'POST', body: formData});
    loadMessages();
  } catch(e) { console.error('Upload error:', e); }
  event.target.value = '';
}

// ── Sidebar toggle ─────────────────────────────────────────
function showSidebar() { document.getElementById('sidebar').classList.add('show'); }
function hideSidebar() { document.getElementById('sidebar').classList.remove('show'); }
function toggleSidebar() { document.getElementById('sidebar').classList.toggle('show'); }

// Auto-resize textarea
document.getElementById('msgInput').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

// Enter on login
document.getElementById('loginPass').addEventListener('keypress', e => { if(e.key==='Enter') login(); });
document.getElementById('loginUser').addEventListener('keypress', e => { if(e.key==='Enter') document.getElementById('loginPass').focus(); });
</script>
</body>
</html>
